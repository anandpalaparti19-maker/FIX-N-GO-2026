name: fixngo_customer
description: >
  Official customer application for Fix-N-Go Private Limited. 
  A comprehensive mobile repair service platform providing on-demand 
  booking, real-time tracking, and secure payment solutions.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  provider: ^6.1.5+1
  flutter_stripe: ^12.6.0
  socket_io_client: ^2.0.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  url_launcher: ^6.2.5
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.2.7
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "transparent"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 48
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/