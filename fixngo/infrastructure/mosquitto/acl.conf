# ═══════════════════════════════════════════════════════
# MQTT Access Control List — Fix-N-Go
# Controls which users can read/write which topics
# ═══════════════════════════════════════════════════════

# ── Backend service account (full access) ─────────────
# The backend server connects as 'fixngo_app' and needs
# to subscribe to all client topics and publish to all
# server topics.
user fixngo_app
topic readwrite #

# ── Default rules for app clients ─────────────────────
# Flutter apps connect as 'fixngo_client_<userId>'
# Pattern substitution: %u = username
#
# Clients can publish their own status and location
pattern write client/user/%u/online
pattern write client/user/%u/offline
pattern write client/user/%u/location

# Clients can publish order status updates for orders they're part of
pattern write client/order/+/status

# Clients can publish chat messages
pattern write client/chat/message

# Clients can read their own notifications and status
pattern read server/user/%u/notification
pattern read server/user/%u/status

# Clients can read order updates (all orders — filtered client-side by orderId)
pattern read server/order/+/updated
pattern read server/order/+/location

# Clients can read chat messages addressed to them
pattern read server/chat/%u
