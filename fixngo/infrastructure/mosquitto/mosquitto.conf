# ═══════════════════════════════════════════════════════
# Mosquitto Configuration — Fix-N-Go
# Production-hardened with authentication and ACL
# ═══════════════════════════════════════════════════════

# SECURITY: Disable anonymous access — all clients must authenticate
allow_anonymous false

# Password file (generated with mosquitto_passwd)
# To generate: mosquitto_passwd -c /mosquitto/config/passwd fixngo_app
password_file /mosquitto/config/passwd

# Access Control List — restrict topic access per user
acl_file /mosquitto/config/acl.conf

# TCP listener for the backend
listener 1883 0.0.0.0

# WebSocket listener for Flutter apps
listener 9001 0.0.0.0
protocol websockets

# Persistence and Logging
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type warning
log_type error
log_type notice
